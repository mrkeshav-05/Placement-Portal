name: CI
on:
  pull_request:
  push: { branches: [main, develop] }
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: npm run type-check
      - run: npm test
      - run: npm run build
        env: { DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/tnp_portal", AUTH_SECRET: "ci-only-secret" }
