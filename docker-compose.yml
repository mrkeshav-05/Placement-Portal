services:
  db:
    image: postgres:16-alpine
    environment: { POSTGRES_DB: tnp_portal, POSTGRES_USER: postgres, POSTGRES_PASSWORD: postgres }
    ports: ["5432:5432"]
    volumes: ["postgres_data:/var/lib/postgresql/data"]
    healthcheck: { test: ["CMD-SHELL","pg_isready -U postgres -d tnp_portal"], interval: 5s, timeout: 5s, retries: 10 }
  app:
    build: .
    ports: ["3000:3000"]
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/tnp_portal
      AUTH_SECRET: ${AUTH_SECRET:-local-docker-secret-change-me}
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID:-}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET:-}
    depends_on: { db: { condition: service_healthy } }
    healthcheck: { test: ["CMD-SHELL","wget -qO- http://localhost:3000/api/health || exit 1"], interval: 10s, timeout: 5s, retries: 10 }
volumes: { postgres_data: {} }
